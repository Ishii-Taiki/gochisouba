<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gochisouba — 個人投資家向けマーケットサマリー</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --accent: #2563eb;
    --border: #e5e7eb;
    --card-bg: #f9fafb;
    --card-hover: #eef2ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --border: #334155;
      --card-bg: #1e293b;
      --card-hover: #334155;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
    line-height: 1.7;
    color: var(--fg);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  header {
    text-align: center;
    padding: 1.5rem 0 2.5rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 2rem;
  }
  header h1 {
    margin: 0 0 0.5rem;
    font-size: 2rem;
    letter-spacing: -0.02em;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin: 0;
  }
  h2 {
    font-size: 1.2rem;
    margin: 2rem 0 1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .report-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .report-list li {
    margin: 0.75rem 0;
  }
  .report-card {
    display: block;
    padding: 1rem 1.25rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--fg);
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .report-card:hover {
    background: var(--card-hover);
    transform: translateY(-1px);
  }
  .report-date {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--accent);
    display: block;
    margin-bottom: 0.3rem;
  }
  .report-summary {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.55;
  }
  footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }
  footer p { margin: 0.4rem 0; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>gochisouba</h1>
  <p class="subtitle">個人投資家向けマーケットサマリー</p>
</header>

<h2>レポート一覧</h2>

<ul class="report-list">
  <li>
    <a class="report-card" href="reports/2026-05-09.html">
      <span class="report-date">2026-05-09（土）</span>
      <span class="report-summary">米雇用統計とAI需要で米株は最高値、原油・金は地政学で同時高――典型的な「上昇トレンド継続だが過熱感も濃厚」な週末。月曜寄りはギャップアップ余地ありつつ、5/7 急騰の反動と中東リスクで上下どちらにも振れやすい。</span>
    </a>
  </li>
</ul>

<footer>
  <p>⚠️ 本サイトは情報整理を目的としており、投資助言ではありません。最終判断は読者自身のリスク許容度に基づいて行ってください。</p>
  <p><a href="https://github.com/Ishii-Taiki/gochisouba" target="_blank" rel="noopener">GitHub リポジトリ</a></p>
</footer>

</div>
</body>
</html>
