<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>gochisouba — 個人投資家向けマーケットサマリー</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  /* index 専用のレポートカード */
  body { padding-bottom: 24px; }
  .index-hero {
    margin: 16px 0 24px;
    padding: 28px 22px;
    background: var(--gradient-hero);
    color: #fff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .index-hero::after {
    content: "";
    position: absolute;
    top: -40%;
    right: -20%;
    width: 240px;
    height: 240px;
    background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
    pointer-events: none;
  }
  .index-hero h1 {
    margin: 0 0 6px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .index-hero p { margin: 0; font-size: 14px; opacity: 0.9; }
  .index-hero .gh-link {
    display: inline-block;
    margin-top: 14px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
  }
  .index-hero .gh-link:hover { background: rgba(255,255,255,0.28); text-decoration: none; }

  .list-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 24px 0 14px;
  }
  .list-head h2 {
    margin: 0;
    font-size: 15px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .list-head .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg-subtle);
  }

  .report-card {
    display: block;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    text-decoration: none;
    color: var(--fg);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .report-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
    text-decoration: none;
  }
  .report-card .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .report-card .date {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.01em;
  }
  .report-card .stance-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .report-card .stance-pill.bull { color: var(--up); background: var(--up-bg); }
  .report-card .stance-pill.bear { color: var(--down); background: var(--down-bg); }
  .report-card .stance-pill.neutral { color: var(--flat); background: var(--flat-bg); }
  .report-card .summary {
    font-size: 14px;
    line-height: 1.6;
    color: var(--fg);
    margin: 0;
  }
  .report-card .arrow {
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--fg-muted);
    font-size: 12px;
    line-height: 1.7;
  }
  footer p { margin: 4px 0; }
  footer a { color: var(--accent); }
</style>
</head>
<body>

<header class="top-bar">
  <div>
    <div class="brand">gochisouba<span class="dot">.</span></div>
  </div>
  <div class="date">個人投資家向け</div>
</header>

<main class="container">

  <section class="index-hero">
    <h1>📊 gochisouba</h1>
    <p>個人投資家向けマーケットサマリー — 株式・為替・コモディティ・暗号資産を毎日整理。</p>
    <a class="gh-link" href="https://github.com/Ishii-Taiki/gochisouba" target="_blank" rel="noopener">⌨️ GitHub リポジトリ</a>
  </section>

  <div class="list-head">
    <h2>レポート一覧</h2>
    <span class="count">1 件</span>
  </div>

  <a class="report-card" href="reports/2026-05-09.html">
    <div class="meta">
      <span class="date">2026-05-09 (土)</span>
      <span class="stance-pill bull">📈 やや強気</span>
    </div>
    <p class="summary">米雇用統計とAI需要で米株は最高値、原油・金は地政学リスクで同時高。来週 5/12 の米CPI が今週最大の山場。</p>
    <div class="arrow">レポートを開く →</div>
  </a>

  <footer>
    <p>⚠️ 本サイトは情報整理を目的としており、<strong>投資助言ではありません</strong>。最終判断は読者自身のリスク許容度に基づいて行ってください。</p>
    <p><a href="https://github.com/Ishii-Taiki/gochisouba" target="_blank" rel="noopener">GitHub リポジトリ</a></p>
  </footer>

</main>

</body>
</html>
